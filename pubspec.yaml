name: employee_dashboard_app
description: Employee Dashboard Application with Advanced Attendance System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.4.10

  provider: ^6.1.1
  dio: ^5.4.0
  intl: ^0.18.1
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  url_launcher: ^6.2.5
  rxdart: ^0.27.7

  geolocator: ^13.0.1
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  table_calendar: ^3.0.9
  fl_chart: ^0.69.0
  excel: ^4.0.6
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.0
  device_info_plus: ^11.1.0
  
  
  # Use this version instead
  file_picker: ^8.1.4
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/admin_profile.png
    - assets/register_logo.png
    - assets/user_logo.png